<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aude Robles — Turning outdated systems into fast, smooth, modern web">
  <defs>
    <radialGradient id="bg" cx="0.78" cy="0.05" r="1">
      <stop offset="0" stop-color="#3b2a6b"/>
      <stop offset="0.5" stop-color="#0e1130"/>
      <stop offset="1" stop-color="#07081a"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#23254a" stroke-width="1" stroke-opacity="0.4"/>
    </pattern>
    <style>
      .s{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif}
      .m{font-family:'JetBrains Mono','Consolas',monospace}
    </style>
  </defs>

  <rect width="1280" height="400" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="400" rx="20" fill="url(#grid)"/>
  <ellipse cx="1090" cy="60" rx="380" ry="300" fill="url(#glowA)"/>
  <ellipse cx="170" cy="370" rx="320" ry="240" fill="url(#glowB)"/>
  <rect x="1" y="1" width="1278" height="398" rx="20" fill="none" stroke="#2a2d57" stroke-width="1.5"/>

  <!-- Eyebrow -->
  <g class="s">
    <circle cx="72" cy="70" r="5" fill="#22d3ee">
      <animate attributeName="opacity" values="1;0.25;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="90" y="76" fill="#9b9fce" font-size="18" letter-spacing="5" font-weight="600">WEB DEVELOPER · SYSTEMS ENGINEER</text>
  </g>

  <!-- Name -->
  <g class="s">
    <text x="68" y="178" fill="url(#name)" font-size="86" font-weight="800" letter-spacing="-1.5">Aude Robles</text>
    <rect x="72" y="202" width="0" height="5" rx="2.5" fill="url(#accent)">
      <animate attributeName="width" from="0" to="392" dur="1.1s" begin="0.2s" fill="freeze"/>
    </rect>
  </g>

  <!-- Tagline -->
  <g class="s">
    <text x="70" y="256" fill="#e6e3ff" font-size="30" font-weight="600">Turning outdated systems into</text>
    <text x="70" y="298" font-size="30" font-weight="800" fill="url(#accent)">fast, smooth, modern web.</text>
  </g>

  <!-- Before -> After transformation -->
  <g class="m" transform="translate(70, 330)">
    <!-- legacy card -->
    <rect x="0" y="0" width="250" height="46" rx="9" fill="#16182b" stroke="#34374f" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="16" y="20" fill="#6b7090" font-size="12" font-weight="700">legacy.system</text>
    <text x="16" y="36" fill="#e26d6d" font-size="12">⏱ 8.4s  ·  💥 manual</text>

    <!-- arrow -->
    <g transform="translate(266, 23)" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 0 H30 M22 -7 L32 0 L22 7"/>
      <animateTransform attributeName="transform" type="translate" values="266 23;276 23;266 23" dur="1.5s" repeatCount="indefinite"/>
    </g>

    <!-- rebuilt card -->
    <rect x="312" y="0" width="250" height="46" rx="9" fill="#0c2330" stroke="#1c5e6b" stroke-width="1"/>
    <text x="328" y="20" fill="#7df0e0" font-size="12" font-weight="700">rebuilt.system</text>
    <text x="328" y="36" fill="#22d3ee" font-size="12">⚡ 0.3s  ·  ✨ automated</text>
  </g>

  <!-- Right speed lines -->
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a855f7" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g stroke-linecap="round">
    <line x1="980" y1="150" x2="1190" y2="150" stroke="url(#sheen)" stroke-width="3">
      <animate attributeName="x1" values="1190;940" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1210;1110" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="1020" y1="196" x2="1190" y2="196" stroke="url(#sheen)" stroke-width="2">
      <animate attributeName="x1" values="1190;990" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1210;1130" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="1050" y1="242" x2="1190" y2="242" stroke="url(#sheen)" stroke-width="2.5">
      <animate attributeName="x1" values="1190;1020" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1210;1120" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
